<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>福袋一覧</title>

<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Zen Maru Gothic', sans-serif;
  background: #f7f7f8;
  color: #111;
}

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 20px;
}

h1 {
  margin-bottom: 6px;
}

.desc {
  font-size: 13px;
  color: #555;
  margin-bottom: 16px;
  line-height: 1.7;
}

.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.tab {
  padding: 8px 12px;
  border-radius: 8px;
  background: #eee;
  cursor: pointer;
  user-select: none;
}

.tab.active {
  background: #111;
  color: #fff;
}

.card {
  background: #fff;
  border: 1px solid #eee;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
}

.title {
  font-weight: bold;
  font-size: 16px;
  line-height: 1.5;
}

.meta {
  font-size: 12px;
  color: #666;
  margin-top: 6px;
  line-height: 1.7;
}

.badges {
  margin-top: 10px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.badge {
  display: inline-block;
  padding: 5px 10px;
  border-radius: 999px;
  font-size: 11px;
  background: #f2f2f2;
}

.badge.recruiting {
  background: #fff4d6;
  color: #8a5a00;
}

.badge.active {
  background: #e8f8ee;
  color: #146c43;
}

.badge.purchased {
  background: #e9f2ff;
  color: #1d4ed8;
}

.actions {
  margin-top: 12px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

button {
  padding: 8px 12px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-family: inherit;
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.primary {
  background: #111;
  color: #fff;
}

.secondary {
  background: #eee;
  color: #111;
}

.empty {
  background: #fff;
  border: 1px dashed #ddd;
  border-radius: 12px;
  padding: 24px 16px;
  text-align: center;
  color: #666;
  line-height: 1.7;
}

.item {
  border: 1px solid #eee;
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 10px;
  background: #fafafa;
}

.item-title {
  font-weight: 700;
  margin-bottom: 6px;
  line-height: 1.5;
}

.item-meta {
  font-size: 12px;
  color: #666;
  line-height: 1.7;
  margin-bottom: 8px;
}

.item-preview {
  font-size: 13px;
  color: #333;
  line-height: 1.7;
  white-space: pre-wrap;
}

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 16px;
  z-index: 1000;
}

.modal.show {
  display: flex;
}

.modal-content {
  background: #fff;
  padding: 20px;
  max-width: 600px;
  width: 100%;
  border-radius: 12px;
  max-height: 80vh;
  overflow-y: auto;
}

.modal-content h3 {
  margin-top: 0;
  margin-bottom: 8px;
}

.modal-desc {
  font-size: 13px;
  color: #666;
  line-height: 1.7;
  margin-bottom: 14px;
}

.modal-actions {
  margin-top: 16px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

#toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 8px;
  padding: 12px 20px;
  font-size: 12px;
  color: #111;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  z-index: 2000;
  white-space: nowrap;
}

#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

#toast.error {
  border-color: #f1b6b6;
  color: #b42318;
}

#toast.success {
  border-color: #b7e4c7;
  color: #146c43;
}
</style>
</head>

<body>
<div class="container">

  <h1>福袋一覧</h1>
  <div class="desc">
    募集中の福袋に記事を参加させる。販売中の福袋を購入する。
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-recruiting">募集中</div>
    <div class="tab" id="tab-active">販売中</div>
  </div>

  <div id="list"></div>

</div>

<div class="modal" id="previewModal">
  <div class="modal-content">
    <h3 id="previewTitle">プレビュー</h3>
    <div class="modal-desc" id="previewDesc">福袋の内容プレビューです。</div>
    <div id="previewList"></div>
    <div class="modal-actions">
      <button class="secondary" onclick="closePreview()">閉じる</button>
    </div>
  </div>
</div>

<div class="modal" id="entryModal">
  <div class="modal-content">
    <h3 id="entryTitle">参加できる記事</h3>
    <div class="modal-desc" id="entryDesc">この福袋に参加可能な記事一覧です。</div>
    <div id="entryList"></div>
    <div class="modal-actions">
      <button class="secondary" onclick="closeEntry()">閉じる</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="/js/app.js"></script>
<script>
let currentTab = "recruiting";

document.getElementById("tab-recruiting").onclick = () => {
  currentTab = "recruiting";
  setTab();
  loadBundles();
};

document.getElementById("tab-active").onclick = () => {
  currentTab = "active";
  setTab();
  loadBundles();
};

function setTab() {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById("tab-" + currentTab).classList.add("active");
}

function getBundleId(bundle) {
  return Number(bundle.bundle_id ?? bundle.id);
}

function renderEmpty(message) {
  const el = document.getElementById("list");
  el.innerHTML = `
    <div class="empty">${message}</div>
  `;
}

async function loadBundles() {
  try {
    const raw = currentTab === "recruiting"
      ? await App.requestJson("/bundles/recruiting")
      : await App.requestJson("/bundles");

    const items = Array.isArray(raw)
      ? raw.filter(b => currentTab === "recruiting" ? b.status === "recruiting" : b.status === "active")
      : [];

    renderBundles(items);
  } catch (e) {
    App.handleError(e, "福袋一覧の取得に失敗しました");
    renderEmpty("福袋一覧の読み込みに失敗しました。");
  }
}

function renderBundles(items) {
  const el = document.getElementById("list");
  el.innerHTML = "";

  if (!items || items.length === 0) {
    renderEmpty(
      currentTab === "recruiting"
        ? "募集中の福袋はまだありません。"
        : "販売中の福袋はまだありません。"
    );
    return;
  }

  for (const b of items) {
    const bundleId = getBundleId(b);
    const title = b.title || b.bundle_title || "無題の福袋";
    const status = b.status || "";
    const price = Number(b.price_points || 0);
    const purchased = !!b.is_purchased;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="title">${escapeHtml(title)}</div>

      <div class="meta">
        ${escapeHtml(b.category || b.genre || "未設定")} / ${escapeHtml(status)}<br>
        価格: ${price.toLocaleString("ja-JP")}pt
      </div>

      <div class="badges">
        <span class="badge ${status === "recruiting" ? "recruiting" : "active"}">
          ${status === "recruiting" ? "募集中" : "販売中"}
        </span>
        ${purchased ? `<span class="badge purchased">購入済み</span>` : ""}
      </div>

      <div class="actions">
        ${
          status === "recruiting"
          ? `<button class="primary" onclick="openEntry(${bundleId})">参加する</button>`
          : `<button class="primary" onclick="buyBundle(${bundleId})" ${purchased ? "disabled" : ""}>${purchased ? "購入済み" : "購入する"}</button>`
        }
        <button class="secondary" onclick="openPreview(${bundleId})">プレビュー</button>
      </div>
    `;

    el.appendChild(div);
  }
}

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

async function openPreview(bundleId) {
  try {
    const data = await App.requestJson(`/bundles/${bundleId}/preview`);
    const list = document.getElementById("previewList");
    list.innerHTML = "";

    document.getElementById("previewTitle").textContent = data.bundle_title || "プレビュー";
    document.getElementById("previewDesc").textContent =
      `状態: ${data.status || "-"} / 記事数: ${data.title_count || 0} / 著者数: ${data.author_count || 0}`;

    const items = Array.isArray(data.items) ? data.items : [];

    if (items.length === 0) {
      list.innerHTML = `<div class="empty">プレビューできる記事がありません。</div>`;
    } else {
      for (const item of items) {
        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `
          <div class="item-title">${escapeHtml(item.title || "無題の記事")}</div>
          <div class="item-meta">
            ${item.author_name ? `著者: ${escapeHtml(item.author_name)}<br>` : ""}
            ${item.category ? `カテゴリ: ${escapeHtml(item.category)}` : ""}
          </div>
          <div class="item-preview">${escapeHtml(item.content_preview || "")}</div>
        `;
        list.appendChild(div);
      }
    }

    document.getElementById("previewModal").classList.add("show");
  } catch (e) {
    App.handleError(e, "プレビュー取得に失敗しました");
  }
}

function closePreview() {
  document.getElementById("previewModal").classList.remove("show");
}

async function openEntry(bundleId) {
  try {
    const data = await App.requestJson(`/bundles/${bundleId}/entry-candidates/detail`);
    const list = document.getElementById("entryList");
    list.innerHTML = "";

    document.getElementById("entryTitle").textContent = "参加できる記事";
    document.getElementById("entryDesc").textContent =
      "福袋利用が許可されている記事、または取得済み記事を参加させられます。";

    const items = Array.isArray(data) ? data : [];

    if (items.length === 0) {
      list.innerHTML = `
        <div class="empty">
          参加できる記事がありません。<br>
          マイページで福袋利用を確認してください。
        </div>
      `;
    } else {
      for (const item of items) {
        const alreadyEntered = !!item.is_already_entered;
        const entryType = item.entry_type === "gacha" ? "ガチャ取得" : "自分の投稿";

        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `
          <div class="item-title">${escapeHtml(item.title || "無題の記事")}</div>
          <div class="item-meta">
            ${item.category ? `カテゴリ: ${escapeHtml(item.category)}<br>` : ""}
            種別: ${escapeHtml(entryType)}
            ${item.author_name ? `<br>著者: ${escapeHtml(item.author_name)}` : ""}
          </div>
          ${item.content_preview ? `<div class="item-preview">${escapeHtml(item.content_preview)}</div>` : ""}
          <div class="modal-actions">
            <button class="primary" onclick="entry(${bundleId}, ${Number(item.prompt_id)})" ${alreadyEntered ? "disabled" : ""}>
              ${alreadyEntered ? "応募済み" : "この記事で参加"}
            </button>
          </div>
        `;
        list.appendChild(div);
      }
    }

    document.getElementById("entryModal").classList.add("show");
  } catch (e) {
    App.handleError(e, "参加候補の取得に失敗しました");
  }
}

function closeEntry() {
  document.getElementById("entryModal").classList.remove("show");
}

async function entry(bundleId, promptId) {
  try {
    await App.requestJson("/bundles/entry", {
      method: "POST",
      body: JSON.stringify({
        bundle_id: bundleId,
        prompt_id: promptId
      })
    });

    App.showToast("参加しました", "success");
    closeEntry();
    await loadBundles();
  } catch (e) {
    App.handleError(e, "参加に失敗しました");
  }
}

async function buyBundle(bundleId) {
  if (!confirm("購入しますか？")) return;

  try {
    await App.requestJson("/bundles/buy", {
      method: "POST",
      body: JSON.stringify({ bundle_id: bundleId })
    });

    App.showToast("購入しました", "success");
    await loadBundles();
  } catch (e) {
    App.handleError(e, "購入に失敗しました");
  }
}

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    closePreview();
    closeEntry();
  }
});

window.onload = async () => {
  try {
    await App.fetchCsrf();
    await loadBundles();
  } catch (e) {
    App.handleError(e, "初期化に失敗しました");
  }
};
</script>

</body>
</html>
