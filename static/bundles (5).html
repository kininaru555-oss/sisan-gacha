<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>福袋一覧 - 記事ガチャ福袋</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .card-hover {
      transition: all 0.25s ease;
    }
    .card-hover:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.12), 0 8px 10px -6px rgb(0 0 0 / 0.12);
    }
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      opacity: 0;
      pointer-events: none;
      transition: all 0.25s ease;
      z-index: 120;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 12px 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      font-size: 14px;
      white-space: nowrap;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    #toast.success {
      color: #166534;
      border-color: #bbf7d0;
    }
    #toast.error {
      color: #dc2626;
      border-color: #fecaca;
    }
  </style>
</head>
<body class="bg-white text-gray-900">
  <header class="border-b bg-white sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
      <div>
        <h1 class="text-3xl font-bold tracking-tight">福袋一覧</h1>
        <p class="text-sm text-gray-500 mt-1">募集中の福袋と販売中の福袋を確認できます。</p>
      </div>

      <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-3">
        <input
          id="search"
          type="text"
          placeholder="福袋を検索..."
          class="w-full sm:w-80 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-orange-500"
        />
        <select
          id="sort"
          class="border border-gray-300 rounded-lg px-4 py-2 focus:outline-none"
        >
          <option value="new">新着順</option>
          <option value="price-low">価格が安い順</option>
          <option value="price-high">価格が高い順</option>
          <option value="recruiting-first">募集中を優先</option>
          <option value="active-first">販売中を優先</option>
        </select>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-10">
    <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-3 mb-8">
      <div>
        <h2 class="text-2xl font-semibold">すべての福袋</h2>
        <p class="text-gray-500 mt-1">状態に応じて、募集中・購入可能・販売終了を表示します。</p>
      </div>
      <div class="text-sm text-gray-500">
        <span id="result-count">0</span> 件表示
      </div>
    </div>

    <div id="loading" class="hidden text-center py-12">
      <div class="text-4xl">⏳</div>
      <p class="mt-4 text-gray-500">福袋を読み込み中...</p>
    </div>

    <div
      id="bundles-grid"
      class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"
    ></div>

    <div id="empty-state" class="hidden text-center py-16 text-gray-500">
      該当する福袋が見つかりませんでした
    </div>
  </main>

  <div id="toast"></div>

<script src="/js/app.js"></script>
<script>

let allBundles = [];

/* ───────────── ユーティリティ ───────────── */

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

function formatDate(value) {
  if (!value) return "";
  const d = new Date(value);
  if (Number.isNaN(d.getTime())) return "";
  return d.toLocaleDateString("ja-JP");
}

/* ───────────── ヘルパー関数 ───────────── */

function getStatusBadge(status, currentCount, targetCount) {
  if (status === "active") {
    return `<span class="inline-flex items-center rounded-full bg-green-100 text-green-700 text-xs font-semibold px-3 py-1">販売中</span>`;
  }
  if (status === "closed") {
    return `<span class="inline-flex items-center rounded-full bg-gray-200 text-gray-600 text-xs font-semibold px-3 py-1">販売終了</span>`;
  }
  const remain = Math.max((targetCount || 0) - (currentCount || 0), 0);
  return `<span class="inline-flex items-center rounded-full bg-amber-100 text-amber-700 text-xs font-semibold px-3 py-1">募集中 あと${remain}件</span>`;
}

function getActionButton(bundle) {
  if (bundle.status === "active") {
    return `
      <button class="buy-button w-full bg-orange-500 hover:bg-orange-600 transition-colors text-white font-medium py-3 rounded-xl text-sm" 
              data-buy-id="${bundle.id}">
        購入する
      </button>
    `;
  }

  if (bundle.status === "closed") {
    return `
      <button class="w-full bg-gray-300 text-gray-600 font-medium py-3 rounded-xl text-sm cursor-not-allowed" disabled>
        販売終了
      </button>
    `;
  }

  return `
    <button class="w-full bg-amber-100 text-amber-700 font-medium py-3 rounded-xl text-sm cursor-default" disabled>
      募集中
    </button>
  `;
}

function getSearchText(bundle) {
  return [
    bundle.title || "",
    bundle.description || "",
    bundle.genre || "",
    String(bundle.price_points || "")
  ].join(" ").toLowerCase();
}

function sortBundles(bundles, sortValue) {
  const copied = [...bundles];

  switch (sortValue) {
    case "price-low":
      copied.sort((a, b) => (a.price_points || 0) - (b.price_points || 0));
      break;
    case "price-high":
      copied.sort((a, b) => (b.price_points || 0) - (a.price_points || 0));
      break;
    case "recruiting-first":
      const rankRecruit = { recruiting: 0, active: 1, closed: 2 };
      copied.sort((a, b) => (rankRecruit[a.status] ?? 9) - (rankRecruit[b.status] ?? 9));
      break;
    case "active-first":
      const rankActive = { active: 0, recruiting: 1, closed: 2 };
      copied.sort((a, b) => (rankActive[a.status] ?? 9) - (rankActive[b.status] ?? 9));
      break;
    default: // 新着順
      copied.sort((a, b) => {
        const aTime = new Date(a.published_at || a.created_at || 0).getTime();
        const bTime = new Date(b.published_at || b.created_at || 0).getTime();
        return bTime - aTime;
      });
  }
  return copied;
}

/* ───────────── 描画 ───────────── */

function renderBundles() {
  const grid = document.getElementById("bundles-grid");
  const countEl = document.getElementById("result-count");
  const emptyState = document.getElementById("empty-state");
  const search = document.getElementById("search").value.trim().toLowerCase();
  const sort = document.getElementById("sort").value;

  let filtered = allBundles.filter(bundle => {
    if (!search) return true;
    return getSearchText(bundle).includes(search);
  });

  filtered = sortBundles(filtered, sort);

  // 件数表示
  if (countEl) countEl.textContent = filtered.length;

  grid.innerHTML = "";

  if (filtered.length === 0) {
    emptyState?.classList.remove("hidden");
    return;
  }

  emptyState?.classList.add("hidden");

  for (const bundle of filtered) {
    const card = document.createElement("div");
    card.className = "bg-white border border-gray-200 rounded-2xl overflow-hidden card-hover";

    const currentCount = Number(bundle.current_article_count || 0);
    const targetCount = Number(bundle.target_article_count || 0);
    const remainingCount = Math.max(targetCount - currentCount, 0);
    const progressPercent = targetCount > 0 
      ? Math.min(Math.floor((currentCount / targetCount) * 100), 100) 
      : 0;

    card.innerHTML = `
      <div class="h-44 bg-gray-100 flex items-center justify-center relative cursor-pointer" data-detail-id="${bundle.id}">
        <div class="text-7xl">🎁</div>
        <div class="absolute top-3 left-3">
          ${getStatusBadge(bundle.status, currentCount, targetCount)}
        </div>
      </div>

      <div class="p-6">
        <div class="text-xs text-gray-500 mb-2">${escapeHtml(bundle.genre || "その他")}</div>
        <h3 class="font-semibold text-lg leading-tight mb-2 line-clamp-2">${escapeHtml(bundle.title || "無題の福袋")}</h3>
        <p class="text-sm text-gray-600 mb-4 line-clamp-3">${escapeHtml(bundle.description || "説明はまだありません")}</p>

        <div class="flex items-baseline gap-2 mb-4">
          <span class="text-2xl font-bold text-orange-600">${Number(bundle.price_points || 0)} pt</span>
        </div>

        <div class="space-y-2 mb-5">
          <div class="text-sm text-gray-600">
            ${bundle.status === "recruiting"
              ? `進捗: ${currentCount} / ${targetCount} 件`
              : `収録記事数: ${targetCount} 件`}
          </div>

          ${bundle.status === "recruiting" ? `
            <div class="w-full bg-gray-200 rounded-full h-2">
              <div class="bg-amber-500 h-2 rounded-full" style="width:${progressPercent}%"></div>
            </div>
            <div class="text-xs text-gray-500">あと ${remainingCount} 件で販売開始</div>
          ` : ""}

          <div class="text-xs text-gray-500">
            ${formatDate(bundle.published_at || bundle.created_at)}
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <button class="detail-button w-full border border-orange-500 text-orange-600 hover:bg-orange-50 transition-colors font-medium py-3 rounded-xl text-sm"
                  data-detail-id="${bundle.id}">
            詳細を見る
          </button>
          ${getActionButton(bundle)}
        </div>
      </div>
    `;

    grid.appendChild(card);
  }
}

/* ───────────── データ読み込み ───────────── */

async function loadBundles() {
  const grid = document.getElementById("bundles-grid");
  const loading = document.getElementById("loading");

  if (loading) loading.classList.remove("hidden");
  if (grid) grid.innerHTML = "";

  try {
    const res = await App.publicFetch?.("/bundles") || 
                fetch(`${App.API_BASE || ""}/bundles`, { credentials: "include" }).then(r => {
                  if (!r.ok) throw new Error("取得失敗");
                  return r;
                });

    const data = await res.json();
    allBundles = Array.isArray(data) ? data : [];
    renderBundles();
  } catch (err) {
    App.handleError(err, "福袋一覧の読み込みに失敗しました");
    if (grid) {
      grid.innerHTML = `<p class="col-span-full text-center text-red-500 py-12">福袋の読み込みに失敗しました</p>`;
    }
  } finally {
    if (loading) loading.classList.add("hidden");
  }
}

/* ───────────── 購入処理 ───────────── */

async function buyBundle(bundleId) {
  const bundle = allBundles.find(v => Number(v.id) === Number(bundleId));
  if (!bundle) {
    App.showToast("福袋情報が見つかりません", "error");
    return;
  }

  if (bundle.status !== "active") {
    App.showToast("この福袋は現在購入できません", "error");
    return;
  }

  const ok = confirm(`「${bundle.title}」を ${bundle.price_points} pt で購入しますか？`);
  if (!ok) return;

  try {
    await App.fetchWithAuth("/bundles/buy", {
      method: "POST",
      body: JSON.stringify({ bundle_id: bundleId })
    });

    App.showToast("購入が完了しました", "success");

    // 購入後、詳細ページへ遷移
    setTimeout(() => {
      window.location.href = `bundle-detail.html?id=${encodeURIComponent(bundleId)}&purchased=1`;
    }, 600);
  } catch (err) {
    App.handleError(err, "購入処理に失敗しました");
  }
}

/* ───────────── イベント設定 ───────────── */

function bindEvents() {
  const grid = document.getElementById("bundles-grid");
  if (!grid) return;

  grid.addEventListener("click", async (event) => {
    // 購入ボタン
    const buyTarget = event.target.closest("[data-buy-id]");
    if (buyTarget) {
      event.stopPropagation();
      const bundleId = Number(buyTarget.dataset.buyId);
      await buyBundle(bundleId);
      return;
    }

    // 詳細ボタン or カード全体クリック
    const detailTarget = event.target.closest("[data-detail-id]");
    if (detailTarget) {
      const id = detailTarget.dataset.detailId;
      window.location.href = `bundle-detail.html?id=${encodeURIComponent(id)}`;
    }
  });

  // 検索・ソート
  const searchInput = document.getElementById("search");
  const sortSelect = document.getElementById("sort");

  if (searchInput) searchInput.addEventListener("input", renderBundles);
  if (sortSelect) sortSelect.addEventListener("change", renderBundles);
}

/* ───────────── 初期化 ───────────── */

async function initPage() {
  bindEvents();
  await loadBundles();
}

window.addEventListener("load", initPage);

</script>
</body>
</html>
