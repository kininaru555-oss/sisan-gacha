<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン — 記事自販機ガチャ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=DotGothic16&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root {
  --bg:         #0a0a0f;
  --surface:    #12121a;
  --surface2:   #0e0e16;
  --border:     rgba(255,220,0,0.18);
  --yellow:     #ffd600;
  --yellow-dim: rgba(255,214,0,0.08);
  --amber:      #ff9100;
  --text:       #e8e8e0;
  --muted:      #888880;
  --danger:     #ff4d4d;
  --success:    #80ffb0;
  --font-ja:    'Zen Maru Gothic', sans-serif;
  --font-mono:  'Share Tech Mono', monospace;
  --font-dot:   'DotGothic16', sans-serif;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: var(--font-ja);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,214,0,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,214,0,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
  );
  pointer-events: none;
  z-index: 0;
}

.wrapper {
  max-width: 480px;
  margin: 0 auto;
  padding: 32px 16px 72px;
  min-height: 100vh;
  display: flex;
  align-items: center;
  position: relative;
  z-index: 1;
}

.card {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 26px 22px;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(255,214,0,0.4), transparent);
}

.badge {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--amber);
  border: 1px solid rgba(255,145,0,0.3);
  padding: 4px 12px;
  border-radius: 2px;
  margin-bottom: 14px;
  text-transform: uppercase;
}

.title {
  font-family: var(--font-dot);
  font-size: 2rem;
  line-height: 1.2;
  color: var(--yellow);
  text-shadow: 0 0 24px rgba(255,214,0,0.25);
  margin-bottom: 10px;
}

.desc {
  font-size: 13px;
  line-height: 1.8;
  color: var(--muted);
  margin-bottom: 22px;
}

.form-row {
  margin-bottom: 16px;
}

.form-label {
  display: block;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin-bottom: 6px;
}

.form-input {
  width: 100%;
  padding: 12px 14px;
  border-radius: 8px;
  border: 1px solid rgba(255,220,0,0.12);
  background: var(--surface2);
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.form-input:focus {
  border-color: rgba(255,214,0,0.4);
  box-shadow: 0 0 0 3px rgba(255,214,0,0.06);
}

.primary-btn,
.secondary-btn {
  width: 100%;
  border: none;
  border-radius: 8px;
  padding: 14px 16px;
  cursor: pointer;
  font-size: 14px;
  transition: 0.15s ease;
}

.primary-btn {
  background: var(--yellow);
  color: #0a0a0f;
  font-weight: 700;
  margin-top: 4px;
}

.secondary-btn {
  background: transparent;
  color: var(--text);
  border: 1px solid rgba(255,220,0,0.18);
  margin-top: 10px;
}

.primary-btn:hover:not(:disabled),
.secondary-btn:hover:not(:disabled) {
  transform: translateY(-1px);
}

.primary-btn:disabled,
.secondary-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.note {
  margin-top: 14px;
  font-size: 11px;
  color: var(--muted);
  line-height: 1.7;
  text-align: center;
}

#toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 20px;
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.06em;
  color: var(--text);
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  z-index: 220;
  white-space: nowrap;
}
#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
#toast.error {
  border-color: rgba(255,77,77,0.4);
  color: var(--danger);
}
#toast.success {
  border-color: rgba(128,255,176,0.4);
  color: var(--success);
}
</style>
</head>

<body>
<div class="wrapper">
  <div class="card">
    <div class="badge">LOGIN</div>
    <h1 class="title">ログイン</h1>
    <p class="desc">
      既存アカウントでログインします。<br>
      Cookie認証で安全にセッション管理されます。
    </p>

    <div class="form-row">
      <label class="form-label" for="user_id">USER ID</label>
      <input
        id="user_id"
        class="form-input"
        placeholder="user123"
        autocomplete="username"
      >
    </div>

    <div class="form-row">
      <label class="form-label" for="password">PASSWORD</label>
      <input
        id="password"
        type="password"
        class="form-input"
        placeholder="パスワード"
        autocomplete="current-password"
      >
    </div>

    <button id="loginBtn" class="primary-btn" onclick="login()">ログインする</button>
    <button class="secondary-btn" onclick="goRegister()">新規登録ページへ</button>

    <div class="note">
      ログイン後はマイページへ移動します。
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="/js/app.js"></script>
<script>
function goRegister() {
  location.href = "/register.html";
}

async function login() {
  const user_id = document.getElementById("user_id").value.trim();
  const password = document.getElementById("password").value;
  const btn = document.getElementById("loginBtn");

  if (!user_id) {
    App.showToast("ユーザーIDを入力してください", "error");
    return;
  }

  if (!password) {
    App.showToast("パスワードを入力してください", "error");
    return;
  }

  btn.disabled = true;

  try {
    App.clearClientSession();

    await App.login(user_id, password);

    App.showToast("ログイン成功", "success");
    setTimeout(() => {
      location.href = "/mypage.html";
    }, 700);
  } catch (e) {
    App.handleError(e, "ログイン失敗");
  } finally {
    btn.disabled = false;
  }
}

document.getElementById("password").addEventListener("keydown", function (e) {
  if (e.key === "Enter") {
    login();
  }
});
</script>

</body>
</html>
