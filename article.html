<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>記事閲覧</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 text-gray-900">

<!-- ヘッダー -->
<header class="border-b bg-white sticky top-0 z-50">
  <div class="max-w-4xl mx-auto px-6 py-4 flex justify-between items-center">
    <h1 class="text-xl font-bold">記事閲覧</h1>
    <a href="/" class="text-sm text-gray-500 hover:text-gray-700">← 戻る</a>
  </div>
</header>

<!-- 本文 -->
<main class="max-w-3xl mx-auto px-6 py-10">

  <div id="loading" class="text-center py-12">
    <div class="text-3xl">⏳</div>
    <p class="mt-3 text-gray-500">読み込み中...</p>
  </div>

  <div id="article-container" class="hidden">

    <h2 id="title" class="text-2xl font-bold mb-6"></h2>

    <div id="content" class="prose max-w-none text-gray-800 leading-relaxed"></div>

    <!-- ロックUI -->
    <div id="locked-area" class="hidden mt-10 p-6 bg-yellow-50 border border-yellow-200 rounded-xl">

      <div class="text-lg font-semibold mb-2">🔒 続きを読むには購入が必要です</div>
      <p class="text-sm text-gray-600 mb-4">
        この福袋を購入すると、すべての記事が解放されます。
      </p>

      <button id="buy-button"
        class="w-full bg-orange-500 hover:bg-orange-600 text-white py-3 rounded-xl font-semibold">
        福袋を購入する
      </button>

    </div>

  </div>

</main>

<!-- トースト -->
<div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-black text-white px-6 py-3 rounded-xl hidden"></div>

<script>

const API_BASE =
  window.APP_CONFIG?.API_BASE ||
  localStorage.getItem("API_BASE") ||
  "";

function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.remove("hidden");
  setTimeout(() => el.classList.add("hidden"), 2000);
}

function escapeHtml(str) {
  return String(str ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#39;");
}

function getCsrfToken() {
  return sessionStorage.getItem("csrf_token") || "";
}

async function fetchCsrf() {
  const res = await fetch(`${API_BASE}/auth/csrf`, {
    credentials: "include"
  });
  const data = await res.json();
  sessionStorage.setItem("csrf_token", data.csrf_token || "");
}

async function authFetch(path, options = {}) {
  const method = (options.method || "GET").toUpperCase();
  let csrf = getCsrfToken();

  if (!csrf) {
    await fetchCsrf();
    csrf = getCsrfToken();
  }

  const headers = {...(options.headers || {})};

  if (!["GET","HEAD"].includes(method)) {
    headers["X-CSRF-Token"] = csrf;
  }

  const res = await fetch(`${API_BASE}${path}`, {
    ...options,
    method,
    headers,
    credentials: "include"
  });

  if (res.status === 401) {
    location.href = "/login.html";
    throw new Error("認証エラー");
  }

  if (!res.ok) {
    const data = await res.json().catch(()=>({}));
    throw new Error(data.detail || "エラー");
  }

  return res;
}

function getArticleId() {
  const params = new URLSearchParams(location.search);
  return params.get("id");
}

let currentBundleId = null;

async function loadArticle() {
  const id = getArticleId();
  if (!id) {
    alert("記事IDがありません");
    return;
  }

  try {
    const res = await authFetch(`/articles/${id}`);
    const data = await res.json();

    document.getElementById("title").innerHTML = escapeHtml(data.title);

    document.getElementById("content").innerHTML = data.content;

    if (data.locked) {
      document.getElementById("locked-area").classList.remove("hidden");
    }

    document.getElementById("article-container").classList.remove("hidden");

  } catch (err) {
    console.error(err);
    showToast(err.message);
  } finally {
    document.getElementById("loading").classList.add("hidden");
  }
}

async function buyBundle() {
  if (!currentBundleId) {
    showToast("購入対象が不明です");
    return;
  }

  if (!confirm("この福袋を購入しますか？")) return;

  try {
    await authFetch(`/bundles/${currentBundleId}/purchase`, {
      method: "POST"
    });

    showToast("購入完了");

    setTimeout(() => location.reload(), 1200);

  } catch (err) {
    console.error(err);
    showToast(err.message);
  }
}

document.getElementById("buy-button").addEventListener("click", buyBundle);

window.onload = loadArticle;

</script>

</body>
  </html>
