<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マイページ — 記事自販機ガチャ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=DotGothic16&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root {
  --bg:         #0a0a0f;
  --surface:    #12121a;
  --surface2:   #0e0e16;
  --border:     rgba(255,220,0,0.18);
  --yellow:     #ffd600;
  --yellow-dim: rgba(255,214,0,0.08);
  --amber:      #ff9100;
  --text:       #e8e8e0;
  --muted:      #888880;
  --danger:     #ff4d4d;
  --success:    #80ffb0;
  --blue:       #7dd3fc;
  --font-ja:    'Zen Maru Gothic', sans-serif;
  --font-mono:  'Share Tech Mono', monospace;
  --font-dot:   'DotGothic16', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-ja);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,214,0,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,214,0,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
  );
  pointer-events: none;
  z-index: 0;
}

.wrapper {
  max-width: 980px;
  margin: 0 auto;
  padding: 24px 16px 72px;
  position: relative;
  z-index: 1;
}

.breadcrumb {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--muted);
  margin-bottom: 32px;
  opacity: 0;
  animation: fadeUp 0.5s 0.05s ease forwards;
}
.breadcrumb a { color: var(--muted); text-decoration: none; }
.breadcrumb a:hover { color: var(--yellow); }
.breadcrumb-sep { opacity: 0.4; }
.breadcrumb-current { color: var(--yellow); }

.page-header {
  margin-bottom: 28px;
  opacity: 0;
  animation: fadeUp 0.6s 0.15s ease forwards;
}
.page-badge {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--amber);
  border: 1px solid rgba(255,145,0,0.3);
  padding: 4px 12px;
  border-radius: 2px;
  margin-bottom: 14px;
  text-transform: uppercase;
}
.page-title {
  font-family: var(--font-dot);
  font-size: clamp(1.8rem, 6vw, 2.6rem);
  color: var(--yellow);
  text-shadow: 0 0 24px rgba(255,214,0,0.25);
  line-height: 1.2;
  margin-bottom: 10px;
}
.page-desc {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.8;
}

.summary-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0,1fr));
  gap: 14px;
  margin-bottom: 20px;
  opacity: 0;
  animation: fadeUp 0.6s 0.25s ease forwards;
}
@media (max-width: 900px) {
  .summary-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
}
@media (max-width: 520px) {
  .summary-grid { grid-template-columns: 1fr; }
}

.summary-card,
.section-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px 18px;
  position: relative;
  overflow: hidden;
}
.summary-card::before,
.section-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(255,214,0,0.4), transparent);
}

.summary-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 10px;
}
.summary-value {
  font-family: var(--font-dot);
  font-size: 1.6rem;
  color: var(--yellow);
}
.summary-note {
  margin-top: 8px;
  color: var(--muted);
  font-size: 12px;
}

.section-card {
  margin-bottom: 16px;
  opacity: 0;
  animation: fadeUp 0.6s 0.35s ease forwards;
}
.section-title {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  color: var(--yellow);
  text-transform: uppercase;
  margin-bottom: 18px;
}

.session-row {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
  justify-content: space-between;
}
.session-box {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.8;
}
.session-box strong {
  color: var(--text);
}
.session-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.button {
  border: 1px solid rgba(255,220,0,0.18);
  background: var(--surface2);
  color: var(--text);
  padding: 10px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  transition: 0.15s ease;
}
.button:hover:not(:disabled) {
  transform: translateY(-1px);
  border-color: rgba(255,214,0,0.35);
}
.button.primary {
  background: var(--yellow);
  color: #0a0a0f;
  border-color: transparent;
  font-weight: 700;
}
.button.danger {
  border-color: rgba(255,77,77,0.35);
  color: #ffb4b4;
}
.button:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}

.empty-box {
  text-align: center;
  color: var(--muted);
  font-size: 13px;
  padding: 18px 8px;
  border: 1px dashed rgba(255,220,0,0.1);
  border-radius: 10px;
}

.prompt-list {
  display: grid;
  gap: 14px;
}
.prompt-card {
  background: var(--surface2);
  border: 1px solid rgba(255,220,0,0.12);
  border-radius: 12px;
  padding: 16px;
}
.prompt-head {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: flex-start;
  margin-bottom: 12px;
}
.prompt-title {
  font-size: 18px;
  font-weight: 700;
  line-height: 1.45;
}
.prompt-meta {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.7;
}
.prompt-url {
  display: inline-block;
  margin-top: 8px;
  color: var(--blue);
  text-decoration: none;
  word-break: break-all;
}
.prompt-url:hover {
  text-decoration: underline;
}

.badge-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 14px;
}
.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  border-radius: 999px;
  padding: 6px 11px;
  font-size: 11px;
  font-family: var(--font-mono);
  letter-spacing: 0.04em;
  border: 1px solid transparent;
}
.badge.ok {
  background: rgba(128,255,176,0.08);
  border-color: rgba(128,255,176,0.22);
  color: var(--success);
}
.badge.off {
  background: rgba(255,77,77,0.08);
  border-color: rgba(255,77,77,0.22);
  color: #ffb4b4;
}
.badge.pending {
  background: rgba(255,214,0,0.08);
  border-color: rgba(255,214,0,0.22);
  color: var(--yellow);
}

.action-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0,1fr));
  gap: 10px;
}
@media (max-width: 700px) {
  .action-grid { grid-template-columns: 1fr; }
}

.footer {
  margin-top: 36px;
  padding-top: 24px;
  border-top: 1px solid rgba(255,214,0,0.08);
  text-align: center;
}
.footer-links {
  display: flex;
  gap: 6px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 14px;
}
.footer-links a {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--muted);
  text-decoration: none;
  padding: 4px 10px;
  border: 1px solid rgba(255,214,0,0.1);
  border-radius: 3px;
}
.footer-links a:hover { color: var(--yellow); border-color: var(--border); }
.footer-copy {
  font-size: 10px;
  color: rgba(136,136,128,0.4);
  font-family: var(--font-mono);
  letter-spacing: 0.06em;
}

#toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 20px;
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.06em;
  color: var(--text);
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  z-index: 200;
  white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.error { border-color: rgba(255,77,77,0.4); color: var(--danger); }
#toast.success { border-color: rgba(128,255,176,0.4); color: var(--success); }

#loadingOverlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(4px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
#loadingOverlay.show { display: flex; }
.loading-box { text-align: center; }
.loading-spinner {
  width: 44px;
  height: 44px;
  border: 3px solid rgba(255,214,0,0.15);
  border-top-color: var(--yellow);
  border-radius: 50%;
  margin: 0 auto 14px;
  animation: spin 0.8s linear infinite;
}
.loading-label {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  color: var(--muted);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>

<body>
<div class="wrapper">

  <nav class="breadcrumb">
    <a href="/">TOP</a>
    <span class="breadcrumb-sep">/</span>
    <span class="breadcrumb-current">マイページ</span>
  </nav>

  <div class="page-header">
    <div class="page-badge">MY PAGE</div>
    <h1 class="page-title">マイページ</h1>
    <p class="page-desc">
      投稿記事の管理、作者コントロール、収益確認、掲載停止申請をこのページから行えます。
    </p>
  </div>

  <div class="summary-grid">
    <div class="summary-card">
      <div class="summary-label">USER ID</div>
      <div class="summary-value" id="summary-user">--</div>
      <div class="summary-note">ログイン中のユーザー</div>
    </div>

    <div class="summary-card">
      <div class="summary-label">POINTS</div>
      <div class="summary-value" id="summary-points">--</div>
      <div class="summary-note">現在の保有ポイント</div>
    </div>

    <div class="summary-card">
      <div class="summary-label">YEN</div>
      <div class="summary-value" id="summary-yen">--</div>
      <div class="summary-note">出金可能残高</div>
    </div>

    <div class="summary-card">
      <div class="summary-label">POST COUNT</div>
      <div class="summary-value" id="summary-post-count">--</div>
      <div class="summary-note">累計投稿数</div>
    </div>
  </div>

  <div class="section-card">
    <div class="section-title">▶ SESSION</div>
    <div class="session-row">
      <div class="session-box" id="session-box">
        <strong>確認中</strong><br>
        セッションを確認しています。
      </div>
      <div class="session-actions">
        <button class="button primary" onclick="goLogin()">ログイン</button>
        <button class="button" onclick="goRegister()">新規登録</button>
        <button class="button danger" onclick="logout()">ログアウト</button>
      </div>
    </div>
  </div>

  <div class="section-card">
    <div class="section-title">▶ AUTHOR CONTROLS</div>
    <div id="prompt-list" class="prompt-list"></div>
    <div id="prompt-empty" class="empty-box" style="display:none;">
      投稿記事がまだありません。
    </div>
  </div>

  <div class="footer">
    <div class="footer-links">
      <a href="/terms.html">利用規約</a>
      <a href="/privacy.html">プライバシーポリシー</a>
      <a href="/tokusho.html">特定商取引法</a>
    </div>
    <div class="footer-copy">© 2025 ARTICLE VENDING MACHINE</div>
  </div>
</div>

<div id="loadingOverlay">
  <div class="loading-box">
    <div class="loading-spinner"></div>
    <div class="loading-label">LOADING…</div>
  </div>
</div>

<div id="toast"></div>

<script>
const API_BASE =
  window.APP_CONFIG?.API_BASE ||
  localStorage.getItem("API_BASE") ||
  "";

/* ─── ユーティリティ ───────────────── */
function showToast(msg, type = "") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "show" + (type ? " " + type : "");
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = ""; }, 2800);
}

function setLoading(isLoading) {
  const overlay = document.getElementById("loadingOverlay");
  if (isLoading) overlay.classList.add("show");
  else overlay.classList.remove("show");
}

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

function formatNumber(v) {
  return Number(v || 0).toLocaleString("ja-JP");
}

function formatDate(value) {
  if (!value) return "";
  const d = new Date(value);
  if (Number.isNaN(d.getTime())) return String(value);
  return d.toLocaleString("ja-JP");
}

function getUserId() {
  return localStorage.getItem("user_id") || "";
}

function getCsrfToken() {
  return localStorage.getItem("csrf_token") || "";
}

function setUserId(userId) {
  if (userId) localStorage.setItem("user_id", userId);
}

function clearClientSession() {
  localStorage.removeItem("user_id");
  localStorage.removeItem("csrf_token");
}

/* ─── 認証関連 ───────────────── */
function updateSessionBox(isLoggedIn = false, userId = "") {
  const sessionBox = document.getElementById("session-box");

  if (!isLoggedIn) {
    sessionBox.innerHTML = "<strong>未ログイン</strong><br>ログインしてください。";
    document.getElementById("summary-user").textContent = "--";
    return;
  }

  sessionBox.innerHTML = `
    <strong>ログイン中</strong><br>
    user_id: ${escapeHtml(userId || "取得済み")}<br>
    Cookie Session: 有効
  `;
  document.getElementById("summary-user").textContent = userId || "--";
}

function goLogin() {
  location.href = "/login.html";
}

function goRegister() {
  location.href = "/register.html";
}

async function logout() {
  try {
    let csrf = getCsrfToken();
    if (!csrf) csrf = await fetchCsrf();

    await fetch(`${API_BASE}/auth/logout`, {
      method: "POST",
      credentials: "include",
      headers: csrf ? { "X-CSRF-Token": csrf } : {}
    });
  } catch (_) {
    // ログアウトはクライアント側削除を優先
  }

  clearClientSession();
  showToast("ログアウトしました", "success");
  updateSessionBox(false);
  resetSummary();
  document.getElementById("prompt-list").innerHTML = "";
  document.getElementById("prompt-empty").style.display = "block";

  setTimeout(() => {
    location.href = "/login.html";
  }, 700);
}

function resetSummary() {
  document.getElementById("summary-user").textContent = "--";
  document.getElementById("summary-points").textContent = "--";
  document.getElementById("summary-yen").textContent = "--";
  document.getElementById("summary-post-count").textContent = "--";
}

/* ─── CSRF ───────────────── */
async function fetchCsrf() {
  const res = await fetch(`${API_BASE}/auth/csrf`, {
    method: "GET",
    credentials: "include"
  });

  const data = await res.json().catch(() => ({}));
  if (!res.ok) {
    throw new Error(data.detail || "CSRFトークンの取得に失敗しました");
  }

  const csrfToken = data.csrf_token || "";
  if (csrfToken) {
    localStorage.setItem("csrf_token", csrfToken);
  }
  return csrfToken;
}

/* ─── API呼び出し（Cookie + CSRF + Refresh対応） ───────────────── */
async function authFetch(path, options = {}) {
  const method = (options.method || "GET").toUpperCase();
  let csrfToken = getCsrfToken();

  if (!csrfToken) {
    try {
      csrfToken = await fetchCsrf();
    } catch (_) {
      // GET系なら継続、POST系は後で失敗させる
    }
  }

  const headers = { ...(options.headers || {}) };

  if (!(options.body instanceof FormData) && !headers["Content-Type"]) {
    headers["Content-Type"] = "application/json";
  }

  if (!["GET", "HEAD"].includes(method) && csrfToken) {
    headers["X-CSRF-Token"] = csrfToken;
  }

  let res = await fetch(`${API_BASE}${path}`, {
    ...options,
    method,
    credentials: "include",
    headers
  });

  if (res.status === 401 && path !== "/auth/refresh") {
    const refreshHeaders = {};
    const refreshCsrf = getCsrfToken() || csrfToken;
    if (refreshCsrf) {
      refreshHeaders["X-CSRF-Token"] = refreshCsrf;
    }

    const refreshRes = await fetch(`${API_BASE}/auth/refresh`, {
      method: "POST",
      credentials: "include",
      headers: refreshHeaders
    });

    if (refreshRes.ok) {
      try {
        csrfToken = await fetchCsrf();
      } catch (_) {}

      const retryHeaders = { ...(options.headers || {}) };
      if (!(options.body instanceof FormData) && !retryHeaders["Content-Type"]) {
        retryHeaders["Content-Type"] = "application/json";
      }
      if (!["GET", "HEAD"].includes(method) && csrfToken) {
        retryHeaders["X-CSRF-Token"] = csrfToken;
      }

      res = await fetch(`${API_BASE}${path}`, {
        ...options,
        method,
        credentials: "include",
        headers: retryHeaders
      });
    }
  }

  if (res.status === 401) {
    clearClientSession();
    showToast("セッションが切れました。再度ログインしてください。", "error");
    setTimeout(() => {
      location.href = "/login.html";
    }, 900);
    throw new Error("セッション期限切れ");
  }

  return res;
}

/* ─── データ読み込み ───────────────── */
async function loadSummary() {
  const [mypageRes, earningsRes] = await Promise.all([
    authFetch("/mypage"),
    authFetch("/mypage/earnings")
  ]);

  if (!mypageRes.ok) {
    const data = await mypageRes.json().catch(() => ({}));
    throw new Error(data.detail || "マイページ情報の取得に失敗しました");
  }

  const mypage = await mypageRes.json();
  const earnings = earningsRes.ok ? await earningsRes.json().catch(() => ({})) : {};

  setUserId(mypage.user_id || "");
  updateSessionBox(true, mypage.user_id || "");

  document.getElementById("summary-user").textContent = mypage.user_id || "--";
  document.getElementById("summary-points").textContent = formatNumber(mypage.points);
  document.getElementById("summary-yen").textContent = formatNumber(
    typeof earnings.total_yen !== "undefined" ? earnings.total_yen : (mypage.yen || 0)
  );
  document.getElementById("summary-post-count").textContent = formatNumber(mypage.post_count);
}

async function loadPrompts() {
  const res = await authFetch("/mypage/prompts");
  if (!res.ok) {
    const data = await res.json().catch(() => ({}));
    throw new Error(data.detail || "投稿記事一覧の取得に失敗しました");
  }
  const items = await res.json();
  renderPromptList(items);
}

function renderPromptList(items) {
  const list = document.getElementById("prompt-list");
  const empty = document.getElementById("prompt-empty");
  list.innerHTML = "";

  if (!Array.isArray(items) || items.length === 0) {
    empty.style.display = "block";
    return;
  }

  empty.style.display = "none";

  for (const item of items) {
    const resaleOn = !!item.resale_offer_enabled;
    const bundleOn = !!item.bundle_entry_enabled;
    const pending = !!item.has_pending_stop_request;

    const article = document.createElement("article");
    article.className = "prompt-card";
    article.innerHTML = `
      <div class="prompt-head">
        <div>
          <div class="prompt-title">${escapeHtml(item.title || "無題の記事")}</div>
          <div class="prompt-meta">
            カテゴリ: ${escapeHtml(item.category || "未設定")}<br>
            投稿日: ${escapeHtml(formatDate(item.created_at)) || "-"}
            ${item.url ? `<br><a class="prompt-url" href="${escapeHtml(item.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(item.url)}</a>` : ""}
          </div>
        </div>
      </div>

      <div class="badge-row">
        <span class="badge ${resaleOn ? "ok" : "off"}">
          ${resaleOn ? "●" : "■"} ${resaleOn ? "再販売許可中" : "再販売停止中"}
        </span>
        <span class="badge ${bundleOn ? "ok" : "off"}">
          ${bundleOn ? "●" : "■"} ${bundleOn ? "福袋利用許可中" : "福袋利用停止中"}
        </span>
        <span class="badge ${pending ? "pending" : "ok"}">
          ${pending ? "● 掲載停止申請受付中" : "● 掲載停止申請可能"}
        </span>
      </div>

      <div class="action-grid">
        <button class="button" data-action="resale" data-id="${item.id}" data-enabled="${resaleOn ? "0" : "1"}">
          ${resaleOn ? "再販売をOFFにする" : "再販売をONにする"}
        </button>
        <button class="button" data-action="bundle" data-id="${item.id}" data-enabled="${bundleOn ? "0" : "1"}">
          ${bundleOn ? "福袋利用をOFFにする" : "福袋利用をONにする"}
        </button>
        <button class="button danger" data-action="stop" data-id="${item.id}" ${pending ? "disabled" : ""}>
          ${pending ? "申請受付中" : "掲載停止申請"}
        </button>
      </div>
    `;

    list.appendChild(article);
  }

  bindPromptActions();
}

function bindPromptActions() {
  document.querySelectorAll("[data-action='resale']").forEach(btn => {
    btn.addEventListener("click", async () => {
      const promptId = Number(btn.dataset.id);
      const enabled = btn.dataset.enabled === "1";
      await toggleResale(promptId, enabled);
    });
  });

  document.querySelectorAll("[data-action='bundle']").forEach(btn => {
    btn.addEventListener("click", async () => {
      const promptId = Number(btn.dataset.id);
      const enabled = btn.dataset.enabled === "1";
      await toggleBundle(promptId, enabled);
    });
  });

  document.querySelectorAll("[data-action='stop']").forEach(btn => {
    btn.addEventListener("click", async () => {
      const promptId = Number(btn.dataset.id);
      await requestStop(promptId);
    });
  });
}

/* ─── アクション関数 ───────────────── */
async function toggleResale(promptId, enabled) {
  setLoading(true);
  try {
    const res = await authFetch(`/mypage/prompts/${promptId}/resale-toggle`, {
      method: "POST",
      body: JSON.stringify({ enabled })
    });

    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.detail || "再販売設定の更新に失敗しました");

    showToast(enabled ? "再販売を許可しました" : "再販売を停止しました", "success");
    await loadPrompts();
  } catch (e) {
    showToast(e.message || "再販売設定の更新に失敗しました", "error");
  } finally {
    setLoading(false);
  }
}

async function toggleBundle(promptId, enabled) {
  setLoading(true);
  try {
    const res = await authFetch(`/mypage/prompts/${promptId}/bundle-toggle`, {
      method: "POST",
      body: JSON.stringify({ enabled })
    });

    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.detail || "福袋利用設定の更新に失敗しました");

    showToast(enabled ? "福袋利用を許可しました" : "福袋利用を停止しました", "success");
    await loadPrompts();
  } catch (e) {
    showToast(e.message || "福袋利用設定の更新に失敗しました", "error");
  } finally {
    setLoading(false);
  }
}

async function requestStop(promptId) {
  const reason = prompt("掲載停止申請の理由を入力してください（任意）", "");
  if (reason === null) return;

  setLoading(true);
  try {
    const res = await authFetch(`/mypage/prompts/${promptId}/stop-request`, {
      method: "POST",
      body: JSON.stringify({ reason: reason.trim() })
    });

    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.detail || "掲載停止申請に失敗しました");

    showToast("掲載停止申請を送信しました", "success");
    await loadPrompts();
  } catch (e) {
    showToast(e.message || "掲載停止申請に失敗しました", "error");
  } finally {
    setLoading(false);
  }
}

/* ─── 初期化 ───────────────── */
async function initPage() {
  setLoading(true);

  try {
    await fetchCsrf();
    await loadSummary();
    await loadPrompts();
  } catch (e) {
    updateSessionBox(false);
    document.getElementById("prompt-list").innerHTML = "";
    document.getElementById("prompt-empty").style.display = "block";
    showToast(e.message || "マイページの読み込みに失敗しました", "error");
  } finally {
    setLoading(false);
  }
}

window.onload = initPage;
</script>
</body>
