<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新規登録 — 記事自販機ガチャ</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #0f1115;
  color: #fff;
}

.container {
  max-width: 420px;
  margin: 0 auto;
  padding: 40px 16px;
}

.title {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 24px;
  text-align: center;
}

.card {
  background: #171a21;
  border-radius: 12px;
  padding: 20px;
}

.label {
  font-size: 12px;
  margin-bottom: 6px;
  color: #aaa;
}

.input {
  width: 100%;
  padding: 12px;
  margin-bottom: 16px;
  border-radius: 8px;
  border: none;
  background: #222;
  color: #fff;
}

.button {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  background: #ffd600;
  color: #000;
  font-weight: bold;
  cursor: pointer;
}

.button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.note {
  text-align: center;
  font-size: 12px;
  margin-top: 16px;
  color: #aaa;
}

.link {
  color: #ffd600;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
  <div class="title">新規登録</div>

  <div class="card">

    <div class="label">ユーザーID</div>
    <input id="user_id" class="input" placeholder="user123" autocomplete="username">

    <div class="label">パスワード</div>
    <input id="password" type="password" class="input" placeholder="8文字以上推奨" autocomplete="new-password">

    <div class="label">パスワード確認</div>
    <input id="password_confirm" type="password" class="input" placeholder="もう一度入力" autocomplete="new-password">

    <button id="registerBtn" class="button" onclick="registerUser()">
      新規登録
    </button>

  </div>

  <div class="note">
    すでにアカウントがある場合は  
    <a href="/login.html" class="link">ログイン</a>
  </div>
</div>

<script>
const API_BASE =
  window.APP_CONFIG?.API_BASE ||
  localStorage.getItem("API_BASE") ||
  "";

async function registerUser() {
  const user_id = document.getElementById("user_id").value.trim();
  const password = document.getElementById("password").value;
  const passwordConfirm = document.getElementById("password_confirm").value;
  const btn = document.getElementById("registerBtn");

  if (!user_id) {
    alert("ユーザーIDを入力してください");
    return;
  }

  if (!password) {
    alert("パスワードを入力してください");
    return;
  }

  if (password.length < 4) {
    alert("パスワードは4文字以上にしてください");
    return;
  }

  if (password !== passwordConfirm) {
    alert("パスワード確認が一致しません");
    return;
  }

  btn.disabled = true;

  try {
    const registerRes = await fetch(`${API_BASE}/auth/register`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        user_id,
        password
      })
    });

    const registerData = await registerRes.json().catch(() => ({}));

    if (!registerRes.ok) {
      alert(registerData.detail || "新規登録に失敗しました");
      btn.disabled = false;
      return;
    }

    const loginRes = await fetch(`${API_BASE}/auth/login`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        user_id,
        password
      })
    });

    const loginData = await loginRes.json().catch(() => ({}));

    if (!loginRes.ok) {
      alert(loginData.detail || "登録後ログインに失敗しました");
      btn.disabled = false;
      return;
    }

    localStorage.setItem("access_token", loginData.access_token);
    localStorage.setItem("user_id", loginData.user_id || user_id);

    alert("新規登録完了");
    location.href = "/";
  } catch (e) {
    alert("通信エラー");
    btn.disabled = false;
  }
}

document.getElementById("password_confirm").addEventListener("keydown", function (e) {
  if (e.key === "Enter") {
    registerUser();
  }
});
</script>

</body>
</html>
