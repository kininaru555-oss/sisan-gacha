<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ガチャ結果</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 text-gray-900">

<!-- ヘッダー -->
<header class="border-b bg-white sticky top-0 z-50">
  <div class="max-w-4xl mx-auto px-6 py-4 flex justify-between items-center">
    <h1 class="text-xl font-bold">ガチャ結果</h1>
    <a href="/" class="text-sm text-gray-500 hover:text-gray-700">トップへ</a>
  </div>
</header>

<main class="max-w-4xl mx-auto px-6 py-10">

  <!-- 🎯 ガチャ結果 -->
  <section class="text-center mb-12">

    <div class="text-4xl mb-4">🎉</div>

    <h2 class="text-2xl font-bold mb-2">当たり！</h2>
    <p class="text-gray-500 mb-6">記事を獲得しました</p>

    <div id="result-card" class="bg-white border rounded-2xl p-6 shadow-sm">
      <img id="result-image"
        class="w-full h-60 object-cover rounded-xl mb-4 bg-gray-100"/>

      <h3 id="result-title" class="text-lg font-semibold"></h3>

      <button id="read-button"
        class="mt-6 w-full bg-black text-white py-3 rounded-xl hover:bg-gray-800">
        記事を読む
      </button>
    </div>

  </section>

  <!-- 🔥 おすすめ福袋 -->
  <section>

    <div class="flex justify-between items-center mb-4">
      <h3 class="text-xl font-bold">おすすめ福袋</h3>
      <span class="text-sm text-gray-500">今すぐ読める</span>
    </div>

    <div id="bundles-grid"
      class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
    </div>

  </section>

</main>

<!-- トースト -->
<div id="toast"
  class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-black text-white px-6 py-3 rounded-xl hidden">
</div>

<script>

const API_BASE =
  window.APP_CONFIG?.API_BASE ||
  localStorage.getItem("API_BASE") ||
  "";

function escapeHtml(str) {
  return String(str ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#39;");
}

function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.remove("hidden");
  setTimeout(()=>el.classList.add("hidden"),2000);
}

function publicFetch(path) {
  return fetch(`${API_BASE}${path}`);
}

function getQuery() {
  return new URLSearchParams(location.search);
}

function setResult(data) {
  document.getElementById("result-image").src =
    data.image_url || "";

  document.getElementById("result-title").innerText =
    data.title || "無題";

  document.getElementById("read-button").onclick = () => {
    location.href = `/article.html?id=${encodeURIComponent(data.id)}`;
  };
}

function renderBundles(list) {
  const grid = document.getElementById("bundles-grid");
  grid.innerHTML = "";

  for (const b of list) {
    const el = document.createElement("div");
    el.className = "bg-white border rounded-2xl p-4 hover:shadow-md transition";

    el.innerHTML = `
      <div class="h-32 bg-gray-100 rounded-lg flex items-center justify-center mb-3">
        🎁
      </div>
      <div class="font-semibold text-sm mb-1">${escapeHtml(b.title)}</div>
      <div class="text-xs text-gray-500 mb-2">${escapeHtml(b.category || "")}</div>
      <div class="text-orange-600 font-bold mb-3">${b.price} pt</div>

      <button class="buy-btn w-full bg-orange-500 text-white py-2 rounded-lg"
        data-id="${b.id}">
        購入
      </button>
    `;

    grid.appendChild(el);
  }

  document.querySelectorAll(".buy-btn").forEach(btn=>{
    btn.onclick = async () => {
      const id = btn.dataset.id;
      location.href = `/bundle-detail.html?id=${id}`;
    };
  });
}

async function loadRecommend(category) {
  try {
    const res = await publicFetch(`/bundles/recommend?category=${category || ""}`);
    const data = await res.json();
    renderBundles(data);
  } catch (e) {
    console.error(e);
  }
}

async function init() {
  const q = getQuery();

  // 仮：クエリ or localStorage
  let result = null;

  try {
    result = JSON.parse(localStorage.getItem("last_result") || "null");
  } catch {}

  if (!result) {
    showToast("結果がありません");
    return;
  }

  setResult(result);

  // カテゴリ連動
  loadRecommend(result.category);

}

window.onload = init;

</script>

</body>
</html>
