<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ログイン — 記事自販機ガチャ</title>
<style>
  body { font-family: sans-serif; background: #0f1115; color: #fff; display: flex; justify-content: center; padding-top: 50px; }
  .card { background: #171a21; padding: 30px; border-radius: 12px; width: 300px; text-align: center; }
  input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; background: #222; color: #fff; box-sizing: border-box; }
  button { width: 100%; padding: 12px; border-radius: 5px; border: none; background: #ffd600; font-weight: bold; cursor: pointer; margin-top: 10px; }
</style>
</head>
<body>

<div class="card">
  <h2>ログイン</h2>
  <input id="user_id" placeholder="User ID">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">ログイン</button>
</div>

<script>
const API_BASE = localStorage.getItem("API_BASE") || "";

async function fetchCsrf() {
  const res = await fetch(`${API_BASE}/auth/csrf`, {
    credentials: "include"
  });

  const data = await res.json().catch(() => ({}));

  if (!res.ok) {
    throw new Error(data.detail || "CSRF取得失敗");
  }

  if (data.csrf_token) {
    localStorage.setItem("csrf_token", data.csrf_token);
  }

  return data.csrf_token || "";
}

async function login() {
  const user_id = document.getElementById("user_id").value.trim();
  const password = document.getElementById("password").value;

  try {
    const res = await fetch(`${API_BASE}/auth/login`, {
      method: "POST",
      credentials: "include",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ user_id, password })
    });

    const data = await res.json().catch(() => ({}));

    if (!res.ok) {
      alert(data.detail || "ログイン失敗");
      return;
    }

    localStorage.setItem("user_id", data.user_id || user_id);

    await fetchCsrf();

    alert("ログイン成功");
    location.href = "/mypage.html";
  } catch (e) {
    alert(e.message || "通信エラーが発生しました");
  }
}
</script>

</body>
</html>
